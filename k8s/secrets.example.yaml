# ================================
# DevOps Academy - Kubernetes Secrets EXAMPLE
# Copy this file to secrets.yaml and fill in real values
# secrets.yaml is gitignored and must NEVER be committed
# ================================
#
# Usage:
#   cp k8s/secrets.example.yaml k8s/secrets.yaml
#   # Edit secrets.yaml with real values
#   kubectl apply -f k8s/secrets.yaml
#

apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: devops-academy
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: CHANGE_ME_STRONG_ROOT_PASSWORD
  MYSQL_DATABASE: legal_education_mysql5
  MYSQL_USER: legal_app_user
  MYSQL_PASSWORD: CHANGE_ME_STRONG_USER_PASSWORD

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: devops-academy
type: Opaque
stringData:
  JWT_SECRET: CHANGE_ME_LONG_RANDOM_JWT_SECRET_MIN_32_CHARS
  VIDEO_SECRET: CHANGE_ME_LONG_RANDOM_VIDEO_SECRET
  DEFAULT_ADMIN_PASSWORD: CHANGE_ME_ADMIN_PASSWORD
  DATABASE_URL: "mysql://legal_app_user:CHANGE_ME_STRONG_USER_PASSWORD@mysql:3306/legal_education_mysql5"
